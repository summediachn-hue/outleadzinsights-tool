<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Outleadz Report{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f6f8; --surface:#fff; --surface2:#f1f2f6; --border:#e7e9f0; --border2:#dde0ea;
      --text:#171a23; --muted:#5e6675; --dim:#969cab;
      --accent:#5b54f0; --accent-bg:#eeedfe;
      --green:#0a8f5b; --green-bg:#e7f6ef;
      --yellow:#b7791f; --yellow-bg:#fbf2dd;
      --red:#d63b3b; --red-bg:#fcebeb;
      --purple:#7c3aed; --purple-bg:#f2e9fd;
      --teal:#0d9488;
      --shadow-sm:0 1px 2px rgba(17,24,39,.05);
      --shadow:0 1px 3px rgba(17,24,39,.07),0 1px 2px rgba(17,24,39,.04);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);
         min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-.1px}

    /* ── Top header ── */
    .client-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px}
    .client-header-inner{display:flex;align-items:center;justify-content:space-between;height:58px;max-width:1280px;margin:0 auto}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-mark{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .brand-mark svg{width:17px;height:17px}
    .brand-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
    .brand-client{font-size:11.5px;color:var(--muted);font-weight:450;margin-top:1px}
    .header-right{display:flex;align-items:center;gap:10px}
    .date-range-badge{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);
                      border-radius:7px;padding:5px 12px;font-weight:450}

    /* ── Tab nav ── */
    .client-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px}
    .client-tabs-inner{display:flex;gap:0;max-width:1280px;margin:0 auto}
    .client-tab{display:inline-flex;align-items:center;gap:7px;padding:13px 18px;font-size:13.5px;font-weight:500;
                color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.13s}
    .client-tab:hover{color:var(--text)}
    .client-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
    .client-tab svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    /* ── Page body ── */
    .client-body{max-width:1280px;margin:0 auto;padding:30px 32px 60px}

    /* ── Cards ── */
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:26px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:17px 19px;box-shadow:var(--shadow-sm)}
    .card .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600}
    .card .value{font-size:28px;font-weight:700;margin-top:7px;letter-spacing:-.5px}
    .card .sub{font-size:11.5px;color:var(--dim);margin-top:4px;font-weight:450}
    .value.accent{color:var(--accent)} .value.green{color:var(--green)}

    /* ── Section heading ── */
    .sec-head{display:flex;align-items:center;justify-content:space-between;margin:28px 0 12px}
    .sec-head h2{font-size:15px;font-weight:700;letter-spacing:-.2px}
    .sec-head .muted{font-size:12px;color:var(--dim)}

    /* ── Table ── */
    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:4px;box-shadow:var(--shadow-sm)}
    .table-wrap table{width:100%;border-collapse:collapse}
    .table-wrap th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;
                   padding:11px 16px;text-align:left;border-bottom:1px solid var(--border)}
    .table-wrap td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border)}
    .table-wrap tr:last-child td{border-bottom:none}
    .table-wrap tr:hover td{background:var(--surface2)}

    /* ── Badges ── */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:11.5px;font-weight:600}
    .badge.green{background:var(--green-bg);color:var(--green)}
    .badge.accent{background:var(--accent-bg);color:var(--accent)}
    .badge.yellow{background:var(--yellow-bg);color:var(--yellow)}
    .badge.gray{background:var(--surface2);color:var(--dim)}
    .badge.purple{background:var(--purple-bg);color:var(--purple)}
    .dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}

    /* ── Funnel ── */
    .funnel-row{display:grid;grid-template-columns:90px 1fr 52px;align-items:center;gap:10px;margin-bottom:8px}
    .funnel-label{font-size:12px;color:var(--muted);text-align:right}
    .funnel-bar-track{height:22px;background:var(--surface2);border-radius:5px;overflow:hidden}
    .funnel-bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding:0 9px;
                     font-size:11.5px;font-weight:600;color:#fff;white-space:nowrap;min-width:36px}
    .funnel-count{font-size:12px;color:var(--dim);text-align:right}

    /* ── Filter tabs ── */
    .filter-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .filter-tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);
                background:var(--surface);border:1px solid var(--border);text-decoration:none;transition:.12s}
    .filter-tab:hover{color:var(--text);border-color:var(--border2)}
    .filter-tab.active{background:var(--accent-bg);color:var(--accent);border-color:transparent;font-weight:600}

    /* ── Misc ── */
    .muted{color:var(--muted)} .dim{color:var(--dim)}
    .rate-good{color:var(--green);font-weight:600}
    .rate-warn{color:var(--yellow);font-weight:600}
    .rate-bad{color:var(--red);font-weight:600}
    .empty-state{padding:36px 20px;text-align:center;color:var(--dim);font-size:13.5px}
    a{color:inherit;text-decoration:none}

    /* ── Thread ── */
    .thread-bubble{background:var(--surface);border:1px solid var(--border);border-radius:12px;
                   padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
    .thread-bubble.inbound{border-left:3px solid var(--accent)}
    .thread-meta{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
    .thread-from{font-size:13px;font-weight:600}
    .thread-date{font-size:11.5px;color:var(--dim)}
    .thread-body{font-size:13.5px;line-height:1.65;color:var(--text);white-space:pre-wrap;word-break:break-word}

    /* ── Date range bar ── */
    .tf-bar{display:flex;gap:7px;align-items:center;margin-bottom:22px;flex-wrap:wrap}
    .tf-label{font-size:12.5px;color:var(--muted);margin-right:5px;font-weight:500}
    .tf-pill{padding:6px 14px;border-radius:9px;font-size:12.5px;font-weight:600;border:1px solid var(--border2);
             color:var(--muted);text-decoration:none;background:var(--surface);transition:.12s;box-shadow:var(--shadow-sm)}
    .tf-pill:hover{color:var(--text);background:var(--surface2)}
    .tf-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .daterange{display:none;align-items:center;gap:8px;margin-left:8px}
    .daterange.show{display:inline-flex}
    .daterange input[type=date]{background:var(--surface);border:1px solid var(--border2);color:var(--text);
                                padding:6px 10px;border-radius:8px;font-size:12.5px;font-family:inherit;box-shadow:var(--shadow-sm)}
    .btn-sm-primary{padding:6px 14px;border-radius:8px;font-size:12.5px;font-weight:600;background:var(--accent);
                    color:#fff;border:none;cursor:pointer;font-family:inherit}
  </style>
</head>
<body>
<div class="client-header">
  <div class="client-header-inner">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="9" width="3" height="6" rx="1" fill="white"/>
          <rect x="7" y="6" width="3" height="9" rx="1" fill="white"/>
          <rect x="12" y="3" width="3" height="12" rx="1" fill="white"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Outleadz</div>
        {% if acct %}<div class="brand-client">{{ acct.workspace_name or acct.name }}, Outreach Report</div>{% endif %}
      </div>
    </div>
    <div class="header-right">
      <span class="date-range-badge">{{ ct.label or 'Outreach Report' }}</span>
    </div>
  </div>
</div>

<div class="client-tabs">
  <div class="client-tabs-inner">
    <a href="{{ url_for('client_overview', token_str=ct.token) }}"
       class="client-tab {% if request.endpoint == 'client_overview' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Overview
    </a>
    <a href="{{ url_for('client_intelligence', token_str=ct.token) }}"
       class="client-tab {% if request.endpoint == 'client_intelligence' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M2 20h.01"/><path d="M7 20v-4"/><path d="M12 20v-8"/><path d="M17 20V8"/><path d="M22 4v16"/></svg>
      Intelligence
    </a>
    <a href="{{ url_for('client_leads', token_str=ct.token) }}"
       class="client-tab {% if request.endpoint in ('client_leads','client_thread') %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Leads & Conversations
    </a>
  </div>
</div>

<div class="client-body">
  {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
