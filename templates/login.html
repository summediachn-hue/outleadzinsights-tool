<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outleadz · Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #5b54f0; --accent-strong: #4942e6; --accent-bg: #eeedfe;
      --text: #171a23; --muted: #5e6675; --dim: #969cab;
      --border: #e7e9f0; --surface: #ffffff; --surface2: #f5f6f8;
      --red: #d63b3b; --red-bg: #fcebeb;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.1px;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(91,84,240,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 75% 80%, rgba(91,84,240,.10) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Dot grid */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 44px 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.05) inset;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 34px;
    }
    .logo-mark {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(91,84,240,.45);
      flex-shrink: 0;
    }
    .logo-mark svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text { line-height: 1; }
    .logo-name { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.6px; }
    .logo-tagline { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 2px; font-weight: 450; letter-spacing: 0.2px; }

    h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; margin-bottom: 6px; }
    .subtitle { font-size: 13.5px; color: rgba(255,255,255,.45); margin-bottom: 28px; }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: rgba(255,255,255,.5); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.6px; }
    input[type=email], input[type=password] {
      width: 100%;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border .15s, background .15s;
    }
    input[type=email]:focus, input[type=password]:focus {
      border-color: var(--accent);
      background: rgba(91,84,240,.1);
    }
    input::placeholder { color: rgba(255,255,255,.25); }

    .error-msg {
      background: rgba(214,59,59,.15);
      border: 1px solid rgba(214,59,59,.3);
      color: #f87171;
      padding: 10px 14px;
      border-radius: 9px;
      font-size: 13px;
      margin-bottom: 18px;
      font-weight: 500;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: -0.1px;
      box-shadow: 0 4px 16px rgba(91,84,240,.4);
      transition: background .13s, transform .1s, box-shadow .13s;
      margin-top: 6px;
    }
    .btn-login:hover { background: var(--accent-strong); box-shadow: 0 6px 20px rgba(91,84,240,.5); }
    .btn-login:active { transform: scale(.99); }

    .footer-note {
      margin-top: 22px;
      font-size: 12px;
      color: rgba(255,255,255,.25);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    </div>
    <div class="logo-text">
      <div class="logo-name">Outleadz</div>
      <div class="logo-tagline">Outreach Intelligence Platform</div>
    </div>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your workspace</p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('login_page') }}">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@company.com" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-login">Sign in →</button>
  </form>

  <div class="footer-note">Access is by invitation only. Contact your admin.</div>
</div>
</body>
</html>
